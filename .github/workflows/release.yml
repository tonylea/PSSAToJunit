name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module Pester -Force
          $config = [PesterConfiguration]@{
            Run = @{
              Path    = './tests/unit-tests'
              Exit    = $true
              PassThru = $true
            }
            Output = @{
              Verbosity = 'Detailed'
            }
          }
          Invoke-Pester -Configuration $config

  release:
    needs: test
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          npx commit-and-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update module manifest version
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $psd1Path = './src/PSSAToJunit.psd1'
          $content = Get-Content $psd1Path -Raw
          $content = $content -replace "ModuleVersion = '[^']*'", "ModuleVersion = '$version'"
          Set-Content $psd1Path $content -NoNewline

      - name: Commit and push
        run: |
          git add -A
          git commit --amend --no-edit
          git push --follow-tags

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PS_GALLERY_API_KEY: ${{ secrets.PS_GALLERY_API_KEY }}
        run: |
          Publish-Module -Path ./src -NuGetApiKey $env:PS_GALLERY_API_KEY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
